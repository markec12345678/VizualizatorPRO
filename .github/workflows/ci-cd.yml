# CI/CD Pipeline za VizualizatorPRO
# 
# Workflow-i:
# 1. CI - lint, type-check, build na vsakem PR in push
# 2. Release - tag release in create GitHub Release
# 3. Docker - build in push Docker image na GHCR

name: CI/CD

on:
  push:
    branches: [main, develop]
    tags: ['v*.*.*']
  pull_request:
    branches: [main, develop]

env:
  BUN_VERSION: '1.1.0'

jobs:
  # ============ CI: Lint + Build ============
  ci:
    name: 🔍 Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🍞 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: 📦 Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun
            node_modules
            .next/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: 📥 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🔍 Run ESLint
        run: bun run lint
        continue-on-error: true  # Warnings ne failajo build-a

      - name: 🏗️ Generate Prisma Client
        run: bun run db:generate
        env:
          DATABASE_URL: "file:./db/ci.db"

      - name: 🏗️ Push Prisma Schema
        run: bun run db:push
        env:
          DATABASE_URL: "file:./db/ci.db"

      - name: 🏗️ Build Next.js
        run: bun run build
        env:
          DATABASE_URL: "file:./db/ci.db"
          NEXTAUTH_SECRET: "ci-test-secret-do-not-use-in-production"
          NEXTAUTH_URL: "http://localhost:3000"

      - name: 📊 Upload build artifacts
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: next-build
          path: |
            .next
            !.next/cache
          retention-days: 7

  # ============ Security Scan ============
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔍 Run CodeQL Analysis
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: 🔍 Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: 🔍 Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  # ============ Release (samo na tag) ============
  release:
    name: 📦 Create Release
    needs: [ci, security]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📋 Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: 📝 Extract changelog for version
        id: changelog
        run: |
          # Poišči sekcijsko v CHANGELOG.md
          VERSION="${{ steps.version.outputs.VERSION }}"
          # Izvleček iz CHANGELOG.md
          awk -v ver="[$VERSION]" '
            /^## \[/ { 
              if (in_section) exit
              if (index($0, ver)) in_section=1
            }
            in_section { print }
          ' CHANGELOG.md > release_notes.md
          # Če je prazno, uporabi commit messages
          if [ ! -s release_notes.md ]; then
            echo "## Release v${VERSION}" > release_notes.md
            echo "" >> release_notes.md
            git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 ${{ github.ref }}^)..${{ github.ref }} >> release_notes.md
          fi
          cat release_notes.md

      - name: 📦 Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref }}
          name: VizualizatorPRO v${{ steps.version.outputs.VERSION }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============ Docker Build & Push ============
  docker:
    name: 🐳 Docker Build & Push
    needs: [ci]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📝 Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            latest

      - name: 🐳 Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ============ Deploy na Vercel (main branch) ============
  deploy-vercel:
    name: 🚀 Deploy to Vercel
    needs: [ci, security]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🚀 Setup Vercel CLI
        run: npm install --global vercel@latest

      - name: 🔐 Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        continue-on-error: true  # Ne failaj če Vercel ni konfiguriran

      - name: 🏗️ Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        continue-on-error: true

      - name: 📦 Deploy to Vercel
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} 2>/dev/null || echo "https://vizualizatorpro.si")
          echo "url=$URL" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: ✅ Deployment Status
        run: |
          echo "🚀 Deployed to: ${{ steps.deploy.outputs.url }}"
          echo "ℹ️ Če URL kaže na privzeto domeno, konfiguriraj VERCEL_TOKEN secret"
