# docker-compose.yml za VizualizatorPRO
# 
# Uporaba:
#   docker-compose up -d           # Zaženi v ozadju
#   docker-compose logs -f         # Spremljaj loge
#   docker-compose down            # Ustavi
#   docker-compose build --no-cache  # Rebuild brez cache-a
#
# Produkcijski setup:
#   1. Kopiraj .env.example v .env in izpolni API ključe
#   2. docker-compose up -d
#   3. Aplikacija bo dostopna na http://localhost:3000

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vizualizatorpro
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/db/custom.db
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-vizualizator-pro-dev-secret-change-in-production}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - REPLICATE_API_TOKEN=${REPLICATE_API_TOKEN:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - FROM_EMAIL=${FROM_EMAIL:-onboarding@resend.dev}
      - NOTIFICATION_EMAIL=${NOTIFICATION_EMAIL:-info@vizualizatorpro.si}
    volumes:
      # Persistentna baza
      - db_data:/app/db
      # Uploadi (custom materiali slike)
      - uploads_data:/app/public/uploads
      # Logs
      - logs_data:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - vizualizatorpro-network

  # Reverse proxy (opcijsko - za HTTPS)
  caddy:
    image: caddy:2-alpine
    container_name: vizualizatorpro-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - vizualizatorpro-network
    profiles:
      - production

volumes:
  db_data:
    driver: local
  uploads_data:
    driver: local
  logs_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

networks:
  vizualizatorpro-network:
    driver: bridge
